global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Chat API target
  - job_name: 'chat-api'
    static_configs:
      - targets: ['chat-api:8000']

  # RAG API target
  - job_name: 'rag-api'
    static_configs:
      - targets: ['rag-api:8001']

  # NGINX target
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
    relabel_configs:
      - target_label: instance
        replacement: nginx

  # PostgreSQL target
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis target
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
