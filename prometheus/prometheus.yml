global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Chat API target
  - job_name: 'chat-api'
    static_configs:
      - targets: ['chat-api:8000']

  # RAG API target
  - job_name: 'rag-api'
    static_configs:
      - targets: ['rag-api:8001']

  # NGINX target
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
    relabel_configs:
      - target_label: instance
        replacement: nginx
