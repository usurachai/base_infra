# PostgreSQL Client Authentication Configuration File
# 
# Allow local socket connections (needed for healthchecks)
local   all             all                                     trust

# IPv4 local connections: Use SCRAM-SHA-256 for network access
host    all             all             127.0.0.1/32            scram-sha-256

# Allow Docker network (172.16.0.0/12 is common, or you can use `all` as long as it's firewalled)
# It's recommended to let Docker manage firewall rules and just use `all` mapped via SCRAM
host    all             all             all                     scram-sha-256
