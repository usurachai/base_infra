server {
    listen 80;
    server_name localhost; # Change this when deploying to a domain

    # Increase max body size if needed for large uploads (e.g., PDFs to RAG)
    client_max_body_size 50M;

    # Use Docker's internal DNS resolver to allow dynamic IP resolution.
    # This prevents NGINX from crashing on startup if the app containers
    # (chat-api, rag-api) have not been created or joined the network yet.
    resolver 127.0.0.11 valid=10s;

    # Lua configuration for request/response body capture
    lua_need_request_body on;

    set $resp_body "";
    set $request_body_masked "";

    body_filter_by_lua_block {
        -- Skip buffering for streaming responses (SSE)
        if ngx.header["Content-Type"] and
           ngx.re.find(ngx.header["Content-Type"], "text/event-stream", "ijo") then
            return
        end

        local MAX_BODY_SIZE = 4096
        local resp_body = string.sub(ngx.arg[1], 1, MAX_BODY_SIZE)
        ngx.ctx.buffered = (ngx.ctx.buffered or '') .. resp_body
        if ngx.arg[2] then
            local full_body = ngx.ctx.buffered
            if full_body then
                full_body = ngx.re.gsub(
                    full_body,
                    '("(?:password|token|secret|key|email|phone)"\\s*:\\s*)"[^"]*"',
                    '$1"***"',
                    'ijo'
                )
            end
            ngx.var.resp_body = full_body or '-'
        end
    }

    log_by_lua_block {
        local body = ngx.var.request_body
        if body and body ~= '' then
            body = ngx.re.gsub(
                body,
                '("(?:password|token|secret|key|email|phone)"\\s*:\\s*)"[^"]*"',
                '$1"***"',
                'ijo'
            )
            ngx.var.request_body_masked = body
        else
            ngx.var.request_body_masked = '-'
        end
    }

    # Health check endpoint for Docker
    location = /nginx-health {
        access_log off;
        return 200 'healthy\n';
    }

    # Route to Chat API
    location /api/chat/ {
        limit_req zone=api burst=40 nodelay;

        set $chat_backend http://chat-api:8000;
        proxy_pass $chat_backend;

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route to RAG API
    location /api/rag/ {
        limit_req zone=api burst=40 nodelay;

        set $rag_backend http://rag-api:8001;
        proxy_pass $rag_backend;

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    300s; # RAG processing (embedding + LLM) can take longer

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route to Zendesk Agent API
    location /api/zendesk/ {
        limit_req zone=api burst=40 nodelay;

        set $zendesk_backend http://zendesk-agent-api-1:8000;
        rewrite ^/api/zendesk/?(.*)$ /$1 break;
        proxy_pass $zendesk_backend;

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
