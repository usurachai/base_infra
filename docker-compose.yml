# Define Docker networks created by this repo and joined by external repos
networks:
  frontend-net:
    driver: bridge
  internal-net:
    driver: bridge

services:
  # === Reverse Proxy ===
  nginx:
    image: openresty/openresty:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./nginx/conf.d:/usr/local/openresty/nginx/conf/conf.d:ro
    networks:
      - frontend-net
      - internal-net
    deploy:
      resources:
        limits: { cpus: "0.5", memory: "128M" }
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost/nginx-health" ]
      interval: 10s
      retries: 3

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: nginx-exporter
    command:
      - "-nginx.scrape-uri=http://nginx:8080/stub_status"
    networks:
      - internal-net
    depends_on:
      - nginx
    deploy:
      resources:
        limits: { cpus: "0.2", memory: "64M" }
    restart: unless-stopped

  # === Data Stores ===
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      ZENCONNECT_DB_PASSWORD: ${ZENCONNECT_DB_PASSWORD}
      MEOWRAG_DB_PASSWORD: ${MEOWRAG_DB_PASSWORD}
      # Allows non-localhost login but pg_hba.conf still enforces scram-sha-256
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - ./postgres/pg_hba.conf:/custom-config/pg_hba.conf:ro
    command: [ "postgres", "-c", "hba_file=/custom-config/pg_hba.conf" ]
    networks:
      - internal-net
    deploy:
      resources:
        limits: { cpus: "2.0", memory: "2G" }
        reservations: { cpus: "0.5", memory: "512M" }
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - internal-net
    deploy:
      resources:
        limits: { cpus: "0.5", memory: "512M" }
        reservations: { cpus: "0.1", memory: "64M" }
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Observability Logs + Metrics ===
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--storage.tsdb.retention.time=15d"
    ports:
      # Bound to localhost so it requires SSH/Tailscale to access
      - "127.0.0.1:9090:9090"
    networks:
      - internal-net
    deploy:
      resources:
        limits: { cpus: "0.5", memory: "512M" }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - internal-net
    deploy:
      resources:
        limits: { cpus: "0.5", memory: "512M" }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 3

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    command: -config.file=/etc/promtail/config.yml
    networks:
      - internal-net
    depends_on:
      - loki
    deploy:
      resources:
        limits: { cpus: "0.2", memory: "128M" }
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL:-http://localhost:3000}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      # Bound to localhost so it requires SSH/Tailscale to access
      - "127.0.0.1:3000:3000"
    networks:
      - internal-net
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits: { cpus: "0.5", memory: "256M" }
    restart: unless-stopped

  # === Observability Traces ===
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: jaeger
    user: "0"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
    volumes:
      - jaeger_data:/badger
    ports:
      # UI port bound to localhost
      - "127.0.0.1:16686:16686"
    networks:
      - internal-net
    deploy:
      resources:
        limits: { cpus: "0.5", memory: "512M" }
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - internal-net
    deploy:
      resources:
        limits: { cpus: "0.25", memory: "128M" }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://admin:${POSTGRES_ADMIN_PASSWORD}@postgres:5432/postgres?sslmode=disable"
    networks:
      - internal-net
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits: { cpus: "0.25", memory: "64M" }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9187/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    networks:
      - internal-net
    depends_on:
      - redis
    deploy:
      resources:
        limits: { cpus: "0.25", memory: "64M" }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9121/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pg_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_positions:
  jaeger_data:
